<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: auto; max-height: 100%; }
    </style>
</head>
<body>
    <video id="video" controls autoplay playsinline></video>
    <script>
      var video = document.getElementById('video');
      // رابط قناة الجزيرة الإخبارية (رابط رسمي ومفتوح للتجربة)
      var videoSrc = 'https://live-hls-web-aje.getaj.net/AJE/index.m3u8';
      
      if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
      }
    </script>
</body>
</html>
